name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv venv

      - run: uv sync --frozen

      - run: uv run pytest
      - run: uv run ruff check .
      - run: uv run ruff format --check .